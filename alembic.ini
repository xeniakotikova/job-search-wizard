# =============================================================================
# MIGRATION QUICK REFERENCE
# =============================================================================
#
# Create a new migration (auto-generates file in migrations/versions/):
#   alembic revision -m "add users table"
#
# Apply all pending migrations:
#   alembic upgrade head
#
# Apply next N migrations:
#   alembic upgrade +1
#
# Roll back last migration:
#   alembic downgrade -1
#
# Roll back all migrations:
#   alembic downgrade base
#
# Show current revision applied to DB:
#   alembic current
#
# Show migration history:
#   alembic history --verbose
#
# Show pending (unapplied) migrations:
#   alembic history -r current:head
#
# =============================================================================

[alembic]
script_location = migrations
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
